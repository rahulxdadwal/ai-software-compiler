services:
  - type: web
    name: ai-compiler-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MOCK_MODE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11"
